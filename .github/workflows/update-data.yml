name: Update Market Data

on:
  schedule:
    # Weekdays at 21:35 UTC = 17:35 EDT (35 min after NYSE close at 16:00 ET)
    - cron: '35 21 * * 1-5'
    # Saturday at 16:00 UTC = 12:00 EDT (crypto/forex weekend refresh)
    - cron: '0 16 * * 6'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update prices
        env:
          FMP_KEY:     ${{ secrets.FMP_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python scripts/fetch_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "EBV Data Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "auto: update market data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
