# ============================================================
# E.B.V. — Cross-Validation Report v3.0
# netlify.toml
# ============================================================

[build]
  publish = "."
  functions = "functions"

[[redirects]]
  from = "/api/yahoo"
  to = "/.netlify/functions/yahoo_proxy"
  status = 200

[[redirects]]
  from = "/api/fmp"
  to = "/.netlify/functions/fmp_proxy"
  status = 200

[[redirects]]
  from = "/api/finnhub"
  to = "/.netlify/functions/finnhub_proxy"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-store"
